<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>MOHAMED NASR MOHAMED - بطاقة التواصل</title>
    <!-- Font Awesome 6 (مجانية) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            transition: 0.3s;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #764ba2;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            margin: 0 auto 15px;
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4);
        }
        h1 {
            margin: 0 0 5px;
            color: #2d3748;
            font-size: 1.8rem;
        }
        .org {
            color: #718096;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .divider {
            border: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #764ba2, transparent);
            margin: 20px 0;
        }
        .info-section {
            text-align: right;
            margin: 15px 0;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-item i {
            width: 30px;
            color: #764ba2;
            font-size: 1.3rem;
        }
        .info-item a {
            color: #2d3748;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }
        .info-item a:hover {
            color: #764ba2;
        }
        .social-icons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin-top: 20px;
        }
        .social-icons a {
            transition: transform 0.2s;
        }
        .social-icons a:hover {
            transform: scale(1.15);
        }
        .footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #a0aec0;
        }
        .whatsapp-btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px 0 5px;
            transition: 0.3s;
        }
        .whatsapp-btn:hover {
            background: #128C7E;
            transform: scale(1.02);
        }
        .extra-phones {
            margin-top: 5px;
        }
        .extra-phones a {
            margin: 0 8px;
        }
    </style>
</head>

    <div class="card">

        <hr class="divider">

        <div class="info-section">

            <div class="info-item">
                <i class="fab fa-whatsapp" style="color:#25D366;"></i>
                <span>
                    <a href="https://wa.me/+201023828155" target="_blank" class="whatsapp-btn">
                        <i class="fab fa-whatsapp"></i> تواصل عبر واتساب
                    </a>
                </span>
            </div>
            <!-- أرقام إضافية -->
            
            <div class="info-item extra-phones">
                <i class="fas fa-phone" style="color:#34B7F1;"></i>
                <span><a href='https://wa.me/+201126053031' target='_blank'><i class='fab fa-whatsapp' style='color:#25D366;'></i> +201126053031</a></span>
            </div>
            
            <!-- البريد الإلكتروني الأساسي -->
            <div class="info-item">
                <i class="fas fa-envelope" style="color:#D44638;"></i>
                <span><a href="mailto:m.nsarmm2002@gmail.com">m.nsarmm2002@gmail.com</a></span>
            </div>
            <!-- بريد إضافي -->
            
        </div>

        <!-- أيقونات التواصل الاجتماعي -->
        <div class="social-icons">
            <a href='https://facebook.com/Mohamed Nasr Mohaned' target='_blank' style='display:inline-block; margin:8px; text-decoration:none;'><i class='fab fa-facebook' style='font-size:2.5rem; color:#1877F2;'></i><br><span style='font-size:0.8rem;'>Facebook</span></a>
        </div>

        <div class="footer">

</body>
</html>
